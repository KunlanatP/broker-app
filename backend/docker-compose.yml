version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: broker_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: broker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - broker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d broker_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: broker_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: broker_db
      DB_SSLMODE: disable
      DB_TIMEZONE: Asia/Bangkok
      DB_DSN: "host=postgres port=5432 user=postgres password=postgres dbname=broker_db sslmode=disable TimeZone=Asia/Bangkok"
    ports:
      - "8080:8080"
    entrypoint: ["/app/scripts/entrypoint.sh"]

volumes:
  broker_postgres_data: